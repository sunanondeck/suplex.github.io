```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Is Suplex down?</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Prevent caching -->
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>

body{
  margin:0;
  background:#111;
  color:white;
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial;
  text-align:center;
}

/* Maintenance banner */

#banner{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  background:#e5a00d;
  color:black;
  font-weight:600;
  padding:14px;
  z-index:1000;
}

.banner-visible main{
  margin-top:70px;
}

/* Layout */

main{
  padding-top:60px;
}

/* Title */

h1{
  font-size:42px;
  margin-bottom:20px;
}

/* TV container */

.tv-container{
  position:relative;
  width:460px;
  max-width:90%;
  margin:40px auto;
}

.tv-container svg{
  width:100%;
  height:auto;
}

/* YES / NO text */

.answer{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-58%);
  font-size:120px;
  font-weight:800;
}

/* status colors */

.operational{
  color:white;
}

.outage{
  color:#ff4d4d;
}

/* status message */

#message{
  font-size:20px;
  margin-top:10px;
}

/* last checked */

#checked{
  margin-top:30px;
  font-size:14px;
  opacity:0.7;
}

</style>
</head>

<body>

<div id="banner"></div>

<main>

<h1>Is Suplex down?</h1>

<div class="tv-container">

<svg viewBox="0 0 512 420">

  <!-- antennas -->
  <line x1="220" y1="40" x2="180" y2="0"
        stroke="#ffffff" stroke-width="8"
        stroke-linecap="round"/>
  <line x1="292" y1="40" x2="332" y2="0"
        stroke="#ffffff" stroke-width="8"
        stroke-linecap="round"/>

  <!-- TV bezel -->
  <rect x="40" y="40" width="432" height="260" rx="36"
        fill="#1c1c1c"
        stroke="#ffffff"
        stroke-width="10"/>

  <!-- screen -->
  <rect x="80" y="80" width="352" height="180" rx="18"
        fill="#000000"/>

  <!-- knobs -->
  <circle cx="440" cy="120" r="10" fill="#ffffff"/>
  <circle cx="440" cy="150" r="10" fill="#ffffff"/>

  <!-- feet -->
  <rect x="120" y="300" width="80" height="20"
        fill="#ffffff" rx="6"/>
  <rect x="312" y="300" width="80" height="20"
        fill="#ffffff" rx="6"/>

</svg>

<div id="answer" class="answer">...</div>

</div>

<div id="message"></div>

<div id="checked"></div>

</main>

<script>

fetch("status.json?nocache=" + Date.now())
.then(r => r.json())
.then(data => {

  const answer = document.getElementById("answer");
  const message = document.getElementById("message");
  const checked = document.getElementById("checked");
  const banner = document.getElementById("banner");

  /* YES / NO logic */

  if(data.status === "operational"){
      answer.textContent = "NO";
      answer.className = "answer operational";
  } else {
      answer.textContent = "YES";
      answer.className = "answer outage";
  }

  message.textContent = data.message;
  message.className = answer.className;

  /* last checked */

  const d = new Date(data.last_checked);
  checked.textContent = "Last checked: " + d.toLocaleString();

  /* maintenance banner */

  if(data.banner && data.banner.trim() !== ""){
      banner.textContent = data.banner;
      banner.style.display = "block";
      document.body.classList.add("banner-visible");
  }

});

</script>

</body>
</html>
```
