<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Is the Suplex down?</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root {
  --plex-orange: #e5a00d;
  --plex-dark: #141414;
  --white: #ffffff;
  --down-red: #ff4d4d;
}

body {
  margin:0;
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial;
  background: var(--plex-dark);
  color: var(--white);
  text-align:center;
  transition: background 0.4s;
  overflow-x:hidden;
}

/* Maintenance banner */
#maintenance-banner {
  position:fixed;
  top:-60px;
  left:0;
  width:100%;
  background:var(--plex-orange);
  color:#141414;
  font-weight:700;
  padding:15px 0;
  font-size:18px;
  z-index:9999;
  transition:top 0.6s ease;
}

#content {
  transition:margin-top 0.6s ease;
  padding-top:60px;
}

.question {
  font-size:42px;
  color:var(--plex-orange);
  font-weight:700;
  text-decoration: underline;
  word-break: break-word;
}

/* YES / NO box */
.answer {
  font-size:12vw; /* scales with screen width */
  font-weight:800;
  margin:40px auto 10px auto;
  padding:10px 20px;
  border-radius:20px;
  border:6px solid;
  display:inline-block;
  max-width:90%;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: font-size 0.2s;
}

/* Server ONLINE */
.operational {
  color:var(--white);
  border-color:var(--white);
}

/* Server OFFLINE */
.outage {
  color:var(--down-red);
  border-color:var(--down-red);
}

.message {
  margin-top:20px;
  font-size:22px;
  font-weight:600;
}

footer {
  margin-top:60px;
  opacity:0.6;
  font-size:14px;
}

/* Mobile adjustments */
@media (max-width: 480px) {
  .question {
    font-size:32px;
  }
  .answer {
    font-size:18vw;
    padding:8px 16px;
  }
}
</style>
</head>

<body>

<div id="maintenance-banner"></div>

<div id="content">

<div class="question">Suplex is:</div>

<div id="answer" class="answer">...</div>
<div id="message" class="message"></div>

<footer>
Last checked: <span id="updated"></span>
</footer>

</div>

<script>
async function loadStatus(){
  const res = await fetch('status.json?v=' + Date.now(), {cache:"no-store"});
  const data = await res.json();

  const answer = document.getElementById("answer");
  const message = document.getElementById("message");
  const banner = document.getElementById("maintenance-banner");
  const content = document.getElementById("content");
  const question = document.querySelector(".question");

  if(data.status === "operational"){
      answer.textContent = "ONLINE";
      answer.className = "answer operational";
      message.className = "message operational";
      question.style.color = "var(--plex-orange)"; // default question color
  } else {
      answer.textContent = "OFFLINE";
      answer.className = "answer outage";
      message.className = "message outage";
      question.style.color = "var(--white)"; // question white when offline
  }

  message.textContent = data.message;

  const now = new Date();
  if(data.maintenance 
      && data.maintenance !== "No scheduled maintenance." 
      && (!data.maintenanceExpires || new Date(data.maintenanceExpires) > now)) {
      banner.textContent = "⚠ Scheduled Maintenance: " + data.maintenance;
      banner.style.top = "0px";
      content.style.marginTop = "60px";
  } else {
      banner.style.top = "-60px";
      content.style.marginTop = "0px";
  }

  document.getElementById("updated").textContent =
      new Date(data.lastChecked).toLocaleString();
}

loadStatus();
setInterval(loadStatus,60000);
</script>

</body>
</html>
