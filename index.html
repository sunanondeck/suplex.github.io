<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Is Suplex down?</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root {
  --plex-orange: #e5a00d;
  --plex-dark: #141414;
  --plex-light: #f6f6f6;
  --operational: #2ecc71;
  --outage: #ff4d4d;
}

body{
  margin:0;
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial;
  background: var(--plex-dark);
  color: var(--plex-light);
  text-align:center;
  transition: background 0.5s;
  overflow-x: hidden;
}

/* Sliding maintenance banner */
#maintenance-banner{
  position: fixed;
  top: -60px;
  left:0;
  width:100%;
  background: var(--plex-orange);
  color: var(--plex-dark);
  font-weight:700;
  padding:15px 0;
  font-size:18px;
  z-index:9999;
  transition: top 0.6s ease;
}

#content{
  transition: margin-top 0.6s ease;
  padding-top: 60px; /* default padding for header */
}

header{
  padding:0 20px;
}

.question{
  font-size:42px;
  color: var(--plex-orange);
  font-weight:700;
}

.answer{
  font-size:180px;
  font-weight:800;
  margin-top:40px;
  transition: color 0.5s;
}

.operational{
  color: var(--operational);
}

.outage{
  color: var(--outage);
}

.message{
  margin-top:25px;
  font-size:22px;
  opacity:0.9;
}

footer{
  margin-top:60px;
  opacity:0.6;
  font-size:14px;
}
</style>
</head>

<body>

<div id="maintenance-banner"></div>

<div id="content">
  <header>
    <div class="question">Is Suplex down?</div>
  </header>

  <div id="answer" class="answer">...</div>
  <div id="message" class="message"></div>

  <footer>
  Last checked: <span id="updated"></span>
  </footer>
</div>

<script>
async function loadStatus(){
  const res = await fetch('status.json?v=' + Date.now(), {cache:"no-store"});
  const data = await res.json();

  const answer = document.getElementById("answer");
  const message = document.getElementById("message");
  const banner = document.getElementById("maintenance-banner");
  const content = document.getElementById("content");

  // YES / NO and background color
  if(data.status === "operational"){
      answer.textContent = "NO";
      answer.className = "answer operational";
      document.body.style.backgroundColor = "var(--plex-dark)";
  } else {
      answer.textContent = "YES";
      answer.className = "answer outage";
      document.body.style.backgroundColor = "#2b0000";
  }

  message.textContent = data.message;

  // Sliding banner
  if(data.maintenance && data.maintenance !== "No scheduled maintenance."){
      banner.textContent = "⚠ Scheduled Maintenance: " + data.maintenance;
      banner.style.top = "0px";
      content.style.marginTop = "60px"; // shift content down
  } else {
      banner.style.top = "-60px";
      content.style.marginTop = "0px"; // reset content margin
  }

  document.getElementById("updated").textContent =
      new Date(data.lastChecked).toLocaleString();
}

loadStatus();
setInterval(loadStatus,60000);
</script>

</body>
</html>
