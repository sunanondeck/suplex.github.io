<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Suplex Status</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root {
  --plex-orange: #e5a00d;
  --plex-dark: #141414;
  --white: #ffffff;
  --down-red: #ff4d4d; /* original red for OFFLINE */
}

body{
  margin:0;
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial;
  background: var(--plex-dark);
  color: var(--white);
  text-align:center;
  transition: background 0.4s;
  overflow-x:hidden;
}

/* Maintenance banner */
#maintenance-banner{
  position:fixed;
  top:-60px;
  left:0;
  width:100%;
  background:var(--plex-orange);
  color:#141414;
  font-weight:700;
  padding:15px 0;
  font-size:18px;
  z-index:9999;
  transition:top 0.6s ease;
}

#content{
  transition:margin-top 0.6s ease;
  padding-top:60px;
}

.question{
  font-size:42px;
  color: var(--plex-orange);
  font-weight:700;
  margin: 0 10px; /* prevent overflow on small screens */
}

/* Status box */
.answer{
  font-size: clamp(50px, 12vw, 160px); /* smaller min for mobile */
  font-weight:800;
  margin:40px auto 10px auto;
  padding: clamp(10px, 3vw, 40px) clamp(20px, 10vw, 60px);
  border-radius:20px;
  border:6px solid;
  display:inline-block;
  max-width: 90%; /* ensure fits screen */
  box-sizing: border-box;
  word-break: normal;
  white-space: nowrap; /* prevent text wrap */
  overflow: hidden;
  text-overflow: ellipsis;
  transition: color 0.3s, border-color 0.3s;
}

/* Server ONLINE */
.operational{
  color:var(--white);
  border-color:var(--white);
}

/* Server OFFLINE box */
.outage{
  color:var(--down-red);
  border-color:var(--down-red);
}

/* OFFLINE message text */
.offline-message{
  color: var(--down-red);
}

.message{
  margin-top:20px;
  font-size:22px;
  font-weight:600;
  transition: color 0.3s;
}

footer{
  margin-top:60px;
  opacity:0.6;
  font-size:14px;
}
</style>
</head>

<body>

<div id="maintenance-banner"></div>

<div id="content">
  <div id="question" class="question">Suplex is:</div>

  <div id="answer" class="answer">...</div>
  <div id="message" class="message"></div>

  <footer>
  Last checked: <span id="updated"></span>
  </footer>
</div>

<script>
async function loadStatus(){
  try {
    const res = await fetch('status.json?v=' + Date.now(), {cache:"no-store"});
    const data = await res.json();

    const answer = document.getElementById("answer");
    const message = document.getElementById("message");

    if(data.status === "operational"){
        answer.textContent = "ONLINE";
        answer.className = "answer operational";
        message.textContent = data.message;
        message.className = "message operational";
    } else {
        answer.textContent = "OFFLINE";
        answer.className = "answer outage";
        message.textContent = data.message;
        message.className = "message offline-message";
    }

    const banner = document.getElementById("maintenance-banner");
    const content = document.getElementById("content");
    if(data.maintenance && data.maintenance !== "No scheduled maintenance."){
        banner.textContent = "⚠ Scheduled Maintenance: " + data.maintenance;
        banner.style.top = "0px";
        content.style.marginTop = "60px";
    } else {
        banner.style.top = "-60px";
        content.style.marginTop = "0px";
    }

    document.getElementById("updated").textContent =
        new Date(data.lastChecked).toLocaleString();
  } catch (err) {
    document.getElementById("answer").textContent = "ERROR";
    document.getElementById("message").textContent = "Status check failed.";
  }
}

loadStatus();
setInterval(loadStatus,60000);
</script>

</body>
</html>
