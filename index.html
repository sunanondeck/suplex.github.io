<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Suplex Status</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root {
  --plex-orange: #e5a00d;
  --plex-dark: #141414;
  --white: #ffffff;
  --down-red: #ff4d4d;
}

body {
  margin:0;
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial;
  background: var(--plex-dark);
  color: var(--white);
  text-align:center;
  transition: background 0.4s;
  overflow-x:hidden;
}

#maintenance-banner {
  position:fixed;
  top:-60px;
  left:0;
  width:100%;
  background:var(--plex-orange);
  color:#141414;
  font-weight:700;
  padding:15px 0;
  font-size:18px;
  z-index:9999;
  transition:top 0.6s ease;
}

#content {
  transition:margin-top 0.6s ease;
  padding-top:60px;
}

.question {
  font-size:42px;
  color:var(--plex-orange);
  font-weight:700;
  text-decoration: underline;
  word-break: break-word;
}

.answer {
  font-size:12vw;
  font-weight:800;
  margin:40px auto 10px auto;
  padding:10px 20px;
  border-radius:20px;
  border:6px solid;
  display:inline-block;
  max-width:90%;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  transition: font-size 0.2s;
}

.operational {
  color:var(--white);
  border-color:var(--white);
}

.outage {
  color:var(--down-red);
  border-color:var(--down-red);
}

.message {
  margin-top:20px;
  font-size:22px;
  font-weight:600;
}

footer {
  margin-top:60px;
  opacity:0.6;
  font-size:14px;
}

@media (max-width: 480px) {
  .question { font-size:32px; }
  .answer { font-size:18vw; padding:8px 16px; }
}
</style>
</head>

<body>

<div id="maintenance-banner"></div>

<div id="content">

<div class="question">Suplex is:</div>

<div id="answer" class="answer">...</div>
<div id="message" class="message"></div>

<footer>
Last checked: <span id="updated"></span>
</footer>

</div>

<script>
async function fetchStatusJson(){
  try {
    const res = await fetch('status.json?v=' + Date.now(), {cache:"no-store"});
    return await res.json();
  } catch(e){
    return null;
  }
}

async function checkServerDirectly(){
  try {
    await fetch('https://71.146.187.239:32400/identity?v=' + Date.now(), {method:'GET', mode:'no-cors', cache:'no-store'});
    return { status:"operational", message:"Suplex is running normally.", lastChecked:new Date().toISOString() };
  } catch(e){
    return null;
  }
}

async function updatePage(){
  let data = await checkServerDirectly();
  if(!data){
    data = await fetchStatusJson();
    if(!data){
      data = { status:"outage", message:"Suplex is currently unreachable.", lastChecked: new Date().toISOString() };
    }
  }

  const answer = document.getElementById("answer");
  const message = document.getElementById("message");
  const banner = document.getElementById("maintenance-banner");
  const content = document.getElementById("content");
  const question = document.querySelector(".question");
  const now = new Date();

  if(data.status === "operational"){
    answer.textContent = "ONLINE";
    answer.className = "answer operational";
    message.className = "message operational";
    question.style.color = "var(--plex-orange)";
  } else {
    answer.textContent = "OFFLINE";
    answer.className = "answer outage";
    message.className = "message outage";
    question.style.color = "var(--white)";
  }

  message.textContent = data.message;

  if(data.maintenance 
      && data.maintenance !== "No scheduled maintenance." 
      && (!data.maintenanceExpires || new Date(data.maintenanceExpires) > now)) {
      banner.textContent = "⚠ Scheduled Maintenance: " + data.maintenance;
      banner.style.top = "0px";
      content.style.marginTop = "60px";
  } else {
      banner.style.top = "-60px";
      content.style.marginTop = "0px";
  }

  document.getElementById("updated").textContent = new Date(data.lastChecked).toLocaleString();
}

updatePage();
setInterval(updatePage, 60000);
</script>

</body>
</html>
