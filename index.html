<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Suplex Status</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
  background:#0f0f0f;
  color:#ffffff;
  text-align:center;
}

header{
  padding:40px 20px;
}

h1{
  font-size:42px;
  margin-bottom:10px;
}

.question{
  font-size:26px;
  opacity:0.85;
}

.answer{
  font-size:160px;
  font-weight:800;
  margin-top:40px;
}

.operational{
  color:#2ecc71;
}

.outage{
  color:#ff4d4d;
}

.message{
  margin-top:25px;
  font-size:20px;
  opacity:0.9;
}

.section{
  margin-top:60px;
}

.maintenance-box{
  margin:20px auto;
  padding:20px;
  max-width:600px;
  background:#1b1b1b;
  border-radius:10px;
  border:1px solid #2a2a2a;
}

footer{
  margin-top:60px;
  opacity:0.6;
  font-size:14px;
}

</style>
</head>

<body>

<header>
<h1>Suplex Status</h1>
<div class="question">Is Suplex down?</div>
</header>

<div id="answer" class="answer">...</div>

<div id="message" class="message"></div>

<div class="section">
  <h2>Scheduled Maintenance</h2>
  <div id="maintenance" class="maintenance-box"></div>
</div>

<footer>
Last checked: <span id="updated"></span>
</footer>

<script>

async function loadStatus(){

  const res = await fetch('status.json?v=' + Date.now(), {cache:"no-store"});
  const data = await res.json();

  const answer = document.getElementById("answer");
  const message = document.getElementById("message");
  const maintenance = document.getElementById("maintenance");

  if(data.status === "operational"){
      answer.textContent = "NO";
      answer.className = "answer operational";
  } else {
      answer.textContent = "YES";
      answer.className = "answer outage";
  }

  message.textContent = data.message;
  maintenance.textContent = data.maintenance;

  document.getElementById("updated").textContent =
      new Date(data.lastChecked).toLocaleString();
}

loadStatus();
setInterval(loadStatus,60000);

</script>

</body>
</html>
