name: Is Suplex down?

on:
  schedule:
    - cron: "*/5 * * * *"   # runs every 5 minutes (UTC)
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Check Suplex server
        run: |
          # Determine status
          if curl -k -s --retry 3 --max-time 30 https://71.146.187.239:32400/identity > /dev/null; then
            STATUS="operational"
            MESSAGE="Suplex is running normally."
          else
            STATUS="outage"
            MESSAGE="Suplex is currently unreachable."
          fi

          # Current UTC timestamp
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "Status: $STATUS"
          echo "Message: $MESSAGE"
          echo "Timestamp: $TIMESTAMP"

          # Update status.json with debug field to verify scheduled runs
          jq --arg status "$STATUS" \
             --arg message "$MESSAGE" \
             --arg time "$TIMESTAMP" \
             --arg debug "workflow ran" \
             '.status=$status | .message=$message | .lastChecked=$time | .debug=$debug' \
             status.json > tmp.json

          mv tmp.json status.json

      - name: Commit changes
        run: |
          git config --global user.name "status-bot"
          git config --global user.email "actions@github.com"

          git add status.json
          # Always commit, even if no changes
          git commit -m "Update Suplex status" --allow-empty
          git push
