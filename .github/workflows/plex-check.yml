name: Is Suplex down?

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes UTC
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Check Suplex server
        run: |
          if curl -k -s --retry 3 --max-time 30 https://71.146.187.239:32400/identity > /dev/null; then
            STATUS="operational"
            MESSAGE="Suplex is running normally."
          else
            STATUS="outage"
            MESSAGE="Suplex is currently unreachable."
          fi

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          MAINTENANCE="Server will be down nightly from 4/6 to 4/13 between 9pm-9am PST"
          MAINT_EXPIRES="2026-04-14T09:00:00Z"

          jq --arg status "$STATUS" \
             --arg message "$MESSAGE" \
             --arg time "$TIMESTAMP" \
             --arg maintenance "$MAINTENANCE" \
             --arg maintenanceExpires "$MAINT_EXPIRES" \
             --arg debug "workflow ran" \
             '.status=$status 
              | .message=$message 
              | .lastChecked=$time 
              | .maintenance=$maintenance 
              | .maintenanceExpires=$maintenanceExpires 
              | .debug=$debug' \
             status.json > tmp.json

          mv tmp.json status.json

      - name: Commit changes
        run: |
          git config --global user.name "status-bot"
          git config --global user.email "actions@github.com"
          git add status.json
          git commit -m "Update Suplex status" --allow-empty
          git push
