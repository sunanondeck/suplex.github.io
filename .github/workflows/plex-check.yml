name: Plex Status Check

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Check Plex server
        id: plex
        run: |
          # Attempt to fetch the Plex identity endpoint (works even without login)
          if curl -k -s --max-time 30 https://71.146.187.239:32400/identity > /dev/null; then
            echo "STATUS=operational" >> $GITHUB_ENV
            echo "TITLE=NO - Plex Server Online" >> $GITHUB_ENV
            echo "MESSAGE=The Plex server is running normally." >> $GITHUB_ENV
          else
            echo "STATUS=outage" >> $GITHUB_ENV
            echo "TITLE=YES - Plex Server Offline" >> $GITHUB_ENV
            echo "MESSAGE=The Plex server is currently unreachable. Please check back later." >> $GITHUB_ENV
          fi

      - name: Update status.json
        run: |
          jq --arg status "$STATUS" \
             --arg title "$TITLE" \
             --arg message "$MESSAGE" \
             '.status = $status | .title = $title | .message = $message' \
             status.json > tmp.json
          mv tmp.json status.json

      - name: Commit changes
        run: |
          git config --global user.name "status-bot"
          git config --global user.email "actions@github.com"
          git add status.json
          git commit -m "Auto update Plex status" || exit 0
          git push
