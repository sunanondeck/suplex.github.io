name: Is Suplex down?

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Check Suplex server
        run: |
          # Check if Plex server is reachable
          if curl -k -s --retry 3 --max-time 30 https://71.146.187.239:32400/identity > /dev/null; then
            STATUS="operational"
            MESSAGE="Suplex is running normally."
          else
            STATUS="outage"
            MESSAGE="Suplex is currently unreachable."
          fi

          # Timestamp for this check
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Update JSON file
          jq --arg status "$STATUS" \
             --arg message "$MESSAGE" \
             --arg time "$TIMESTAMP" \
             '.status=$status | .message=$message | .lastChecked=$time' \
             status.json > tmp.json

          mv tmp.json status.json

      - name: Commit changes
        run: |
          git config --global user.name "status-bot"
          git config --global user.email "actions@github.com"

          git add status.json

          # Commit every run, even if status unchanged
          git commit -m "Update Suplex status" || echo "No changes to commit"
          git push
